# JitPack build config. https://jitpack.io/docs/BUILDING/
# Build the SDK on JDK 17 and skip tests here — the full test suite (including the
# embedded-Kafka test) already runs in GitHub Actions (.github/workflows/build.yml),
# and running an embedded broker on JitPack's shared builders is slow/flaky.
jdk:
  - openjdk17
install:
  # Use the Maven Wrapper (pinned to 3.9.9) — JitPack's system Maven is too old for
  # maven-compiler-plugin 3.13.0 (needs Maven >= 3.6.3).
  - ./mvnw install -DskipTests -B
