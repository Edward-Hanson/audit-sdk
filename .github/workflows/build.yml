name: Build & Test

# Verifies every push and pull request: compiles the SDK and runs the full test
# suite (including the embedded-Kafka serialization test). Publishing is handled
# separately by publish.yml on release.
on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn --batch-mode --no-transfer-progress verify
