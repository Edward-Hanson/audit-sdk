name: Publish to GitHub Packages

# Publishes the SDK whenever you create a GitHub Release. Create a release whose
# tag matches the pom version (e.g. v0.1.0 for <version>0.1.0</version>).
on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write   # required to upload to GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
          # Generates ~/.m2/settings.xml with a <server id="github"> that reads
          # credentials from the env vars below — matches distributionManagement.
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Deploy
        run: mvn --batch-mode --no-transfer-progress deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
